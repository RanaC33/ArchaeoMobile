<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
      #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
      #shutter-btn { width: 100px; height: 100px; background: #007bff; color: white; border: 5px solid white; border-radius: 50%; margin-bottom: 40px; cursor: pointer; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
      #timer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: none; align-items: center; justify-content: center; z-index: 2000; flex-direction: column; font-size: 24px; }
      #ai-card { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 450px; background: white; padding: 15px; border-radius: 15px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1001; pointer-events: auto; border: 3px solid #e67e22; }
      .tabs { display: flex; gap: 10px; margin-bottom: 10px; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
      .tab-link { background: none; border: none; color: #555; font-weight: bold; cursor: pointer; padding: 5px; }
      .tab-link.active { color: #007bff; border-bottom: 2px solid #007bff; }
      #chat-history { height: 130px; overflow-y: auto; margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #ccc; padding: 5px; }
      #user-input { width: 65%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
      .ai-name { font-weight: bold; color: #e67e22; }
      #close-btn { position: absolute; top: 10px; right: 10px; background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }
    </style>
  </head>
  <body>

    <div id="timer-overlay">
      <div id="status-text">ANALYZING ARTIFACT...</div>
      <div id="countdown-num" style="font-size: 80px; color: #f1c40f;"></div>
    </div>

    <div id="ui-layer">
      <div id="shutter-btn" onclick="startTimer()">SCAN</div>
    </div>

    <div id="ai-card">
      <button id="close-btn" onclick="resetApp()">X</button>
      <div class="tabs">
        <button class="tab-link active" id="chat-tab-btn" onclick="showTab('chat')">AI CHAT</button>
        <button class="tab-link" id="fact-tab-btn" onclick="showTab('facts')">QUICK FACTS</button>
      </div>

      <div id="chat-section">
        <div id="chat-history"><span class="ai-name">AI:</span> "I am locked on. Ask me about this location!"</div>
        <input type="text" id="user-input" placeholder="Ask a history question...">
        <button onclick="sendMessage()" style="padding:10px; background:#007bff; color:white; border:none; border-radius:8px;">Ask</button>
      </div>

      <div id="facts-section" style="display:none; font-size: 14px; line-height: 1.5;">
        <div id="dynamic-facts">Waiting for scan...</div>
      </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./artifacts.mind; uiLoading: no;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="colosseum-target" mindar-image-target="targetIndex: 0">
        <a-sphere radius="0.1" color="yellow" position="0 0 0.1" opacity="0.5"></a-sphere>
      </a-entity>

      <a-entity id="petra-target" mindar-image-target="targetIndex: 1">
        <a-sphere radius="0.1" color="green" position="0 0 0.1" opacity="0.5"></a-sphere>
      </a-entity>
    </a-scene>

    <script>
      const aiCard = document.getElementById('ai-card');
      const history = document.getElementById('chat-history');
      const overlay = document.getElementById('timer-overlay');
      const countdownNum = document.getElementById('countdown-num');
      const dynamicFacts = document.getElementById('dynamic-facts');
      const sceneEl = document.querySelector('a-scene');

      let currentTarget = ""; // Tracks which one we found

      // SENSORS
      document.getElementById('colosseum-target').addEventListener("targetFound", () => { currentTarget = "colosseum"; });
      document.getElementById('petra-target').addEventListener("targetFound", () => { currentTarget = "petra"; });
      
      document.getElementById('colosseum-target').addEventListener("targetLost", () => { if(sceneEl.isPlaying) currentTarget = ""; });
      document.getElementById('petra-target').addEventListener("targetLost", () => { if(sceneEl.isPlaying) currentTarget = ""; });

      function startTimer() {
        overlay.style.display = "flex";
        let timeLeft = 3;
        countdownNum.innerText = timeLeft;
        const timerInterval = setInterval(() => {
          timeLeft--;
          countdownNum.innerText = timeLeft;
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            capture();
          }
        }, 1000);
      }

      function capture() {
        sceneEl.pause();
        overlay.style.display = "none";
        if (currentTarget !== "") {
          aiCard.style.display = "block";
          document.getElementById('shutter-btn').style.display = "none";
          updateFacts();
        } else {
          alert("Nothing found! Hold the paper closer.");
          resetApp();
        }
      }

      function updateFacts() {
        if(currentTarget === "colosseum") {
          dynamicFacts.innerHTML = "<b>The Colosseum:</b><br>• Located in Rome, Italy.<br>• Built in 70 AD.<br>• It had 80 arched entrances.<br>• It could be flooded for sea battles!";
        } else {
          dynamicFacts.innerHTML = "<b>Petra:</b><br>• Located in Ma'an, Jordan.<br>• Built around 400 BC.<br>• Known as the 'Rose City'.<br>• Carved directly into pink sandstone.";
        }
      }

      function resetApp() {
        sceneEl.play();
        aiCard.style.display = "none";
        document.getElementById('shutter-btn').style.display = "flex";
      }

      function showTab(tab) {
        document.getElementById('chat-section').style.display = tab === 'chat' ? "block" : "none";
        document.getElementById('facts-section').style.display = tab === 'facts' ? "block" : "none";
        document.getElementById('chat-tab-btn').className = tab === 'chat' ? "tab-link active" : "tab-link";
        document.getElementById('fact-tab-btn').className = tab === 'facts' ? "tab-link active" : "tab-link";
      }

      function sendMessage() {
        const input = document.getElementById('user-input');
        const q = input.value.toLowerCase();
        let a = "I only answer history questions about the Colosseum or Petra!";

        // COLOSSEUM BRAIN
        if(currentTarget === "colosseum") {
          if(q.includes("where")) a = "The Colosseum is in the center of Rome, Italy!";
          else if(q.includes("when") || q.includes("built")) a = "Construction started in 70 AD and finished in 80 AD.";
          else if(q.includes("gladiator") && q.includes("play")) a = "Gladiators fought in the 'Arena'—the floor was covered in sand to soak up blood!";
          else if(q.includes("how many") || q.includes("people")) a = "It could hold between 50,000 and 80,000 spectators.";
          else if(q.includes("who built")) a = "Emperor Vespasian started it, and his son Titus finished it.";
        } 
        
        // PETRA BRAIN
        else if(currentTarget === "petra") {
          if(q.includes("where")) a = "Petra is located in the southern part of Jordan.";
          else if(q.includes("when") || q.includes("built")) a = "It was established as early as the 4th century BC (around 400 BC).";
          else if(q.includes("why") || q.includes("pink") || q.includes("rose")) a = "It's called the Rose City because the stone it's carved from is pink sandstone!";
          else if(q.includes("who")) a = "It was built by the Nabataean people, who were expert water engineers.";
        }

        history.innerHTML += `<br><b>You:</b> ${input.value}<br><span class="ai-name">AI:</span> "${a}"`;
        input.value = "";
        history.scrollTop = history.scrollHeight;
      }
    </script>
  </body>
</html>
