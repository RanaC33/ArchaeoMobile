<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #museum-card {
        position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
        width: 90%; background: white; border-radius: 20px;
        display: none; font-family: 'Comic Sans MS', sans-serif; /* Friendly font for kids */
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; overflow: hidden;
        border: 4px solid #f1c40f;
      }
      .tabs { display: flex; background: #f1c40f; }
      .tab-btn { flex: 1; padding: 10px; border: none; cursor: pointer; font-weight: bold; background: #f1c40f; color: #2c3e50; }
      .tab-btn.active { background: white; border-top-left-radius: 10px; border-top-right-radius: 10px; }
      .content-section { padding: 15px; display: none; height: 180px; overflow-y: auto; }
      .content-section.active { display: block; }
      #chat-history { font-size: 14px; margin-bottom: 10px; }
      input { width: 65%; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
      .fact-item { margin-bottom: 8px; padding-left: 10px; border-left: 3px solid #e67e22; font-size: 14px; }
    </style>
  </head>
  <body>

    <a-scene mindar-image="imageTargetSrc: ./artifacts.mind; uiLoading: no;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <a-entity id="target-colosseum" mindar-image-target="targetIndex: 0"><a-box scale="0.4 0.4 0.4" material="color: red; opacity: 0.5"></a-box></a-entity>
      <a-entity id="target-pyramid" mindar-image-target="targetIndex: 1"><a-cone radius-bottom="0.5" height="0.8" material="color: yellow; opacity: 0.5"></a-cone></a-entity>
    </a-scene>

    <div id="museum-card">
      <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tab-chat')">Ask AI</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-facts')">Fun Facts</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-mission')">Mission</button>
      </div>

      <div id="tab-chat" class="content-section active">
        <div id="chat-history">Scan an object to start chatting!</div>
        <input type="text" id="user-input" placeholder="Ask a history question...">
        <button onclick="sendMessage()" style="background:#f1c40f; border:none; padding:8px; border-radius:5px; font-weight:bold;">Ask</button>
      </div>

      <div id="tab-facts" class="content-section">
        <div id="fact-list">Scanning...</div>
      </div>

      <div id="tab-mission" class="content-section">
        <h4 id="mission-title">Secret Task:</h4>
        <p id="mission-desc">Find an artifact to receive your mission!</p>
      </div>
    </div>

    <script>
      let currentArtifact = "";
      
      const data = {
        "Colosseum": {
          intro: "I'm the Colosseum! Ask me about Romans!",
          facts: ["I had 80 entrances!", "I was once filled with water for boat battles!", "My real name is the Flavian Amphitheatre."],
          mission: "Can you count how many arches you see in the photo? (Hint: There were originally 240!)"
        },
        "The Great Pyramid": {
          intro: "I'm a Giant Pyramid! Ask me how I was built!",
          facts: ["I am made of 2 million stones!", "I was the tallest building in the world for 3,800 years!", "I point almost perfectly North."],
          mission: "Look closely at the photo. Is the top of the pyramid smooth or pointy? Why do you think that is?"
        }
      };

      // Tab Switching Logic
      function openTab(evt, tabName) {
        let contents = document.getElementsByClassName("content-section");
        for (let i = 0; i < contents.length; i++) contents[i].style.display = "none";
        let buttons = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < buttons.length; i++) buttons[i].className = buttons[i].className.replace(" active", "");
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
      }

      // Detect Artifacts
      document.getElementById('target-colosseum').addEventListener("targetFound", () => updateUI("Colosseum"));
      document.getElementById('target-pyramid').addEventListener("targetFound", () => updateUI("The Great Pyramid"));

      function updateUI(name) {
        currentArtifact = name;
        document.getElementById('museum-card').style.display = "block";
        document.getElementById('chat-history').innerHTML = `<b>${name}:</b> ${data[name].intro}`;
        
        // Load Facts
        document.getElementById('fact-list').innerHTML = data[name].facts.map(f => `<div class="fact-item">${f}</div>`).join('');
        
        // Load Mission
        document.getElementById('mission-desc').innerText = data[name].mission;
      }

      // Simplified Filtered Chat
      function sendMessage() {
        const input = document.getElementById('user-input');
        const msg = input.value.toLowerCase();
        const history = document.getElementById('chat-history');
        
        const historyWords = ["who", "how", "what", "where", "when", "old", "built", "stone", "king", "rome", "egypt"];
        const isHistory = historyWords.some(w => msg.includes(w));

        let response = isHistory ? "That's a great history question! I'll tell you more when we meet in person!" : "I only talk about history! Ask me about my stones or who built me.";
        
        if(msg.includes("old") && currentArtifact === "Colosseum") response = "I'm nearly 2,000 years old!";
        if(msg.includes("old") && currentArtifact === "The Great Pyramid") response = "I'm over 4,500 years old!";

        history.innerHTML += `<br><b>You:</b> ${input.value}<br><b>AI:</b> ${response}`;
        input.value = "";
        history.scrollTop = history.scrollHeight;
      }
    </script>
  </body>
</html>
