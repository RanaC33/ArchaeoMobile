<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* THE UI LAYER - ALWAYS ON TOP */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
        }

        /* CAMERA SHUTTER BUTTON */
        #shutter-btn {
            width: 80px; height: 80px; background: white; border: 5px solid #3498db;
            border-radius: 50%; margin-bottom: 30px; cursor: pointer; pointer-events: auto;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* COMMAND CENTER CARD */
        #command-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 450px; max-width: 90%; background: white; border-radius: 15px;
            display: none; pointer-events: auto; border: 4px solid #f1c40f;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden;
        }

        .tabs { display: flex; background: #f1c40f; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #f1c40f; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: white; }
        
        .content-area { height: 250px; overflow-y: auto; padding: 15px; background: #f9f9f9; }
        .chat-input { display: flex; padding: 10px; border-top: 1px solid #ddd; }
        .chat-input input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white; display: none;
            align-items: center; justify-content: center; z-index: 10000;
        }
    </style>
</head>
<body>

    <div id="loading-overlay"><h1 id="load-text">📸 TAKING PICTURE...</h1></div>

    <div id="ui-layer">
        <div id="shutter-btn" onclick="takePicture()">CAPTURE</div>

        <div id="command-center">
            <div class="tabs">
                <button class="tab-btn active" onclick="openTab('chat')">AI CHAT</button>
                <button class="tab-btn" onclick="openTab('facts')">FACTS</button>
                <button onclick="closeUI()" style="background:red; color:white; border:none; padding:10px; cursor:pointer;">X</button>
            </div>

            <div id="chat-tab" class="content-area">
                <div id="chat-history"></div>
            </div>

            <div id="facts-tab" class="content-area" style="display:none;">
                <div id="fact-list"></div>
            </div>

            <div class="chat-input">
                <input type="text" id="user-input" placeholder="Ask a history question...">
                <button onclick="askAI()" style="padding:10px; background:#3498db; color:white; border:none; cursor:pointer;">ASK</button>
            </div>
        </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./artifacts.mind; autoStart: true; uiLoading: no; uiScanning: no;" vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false">
            <a-cursor fuse="false" raycaster="objects: .clickable"></a-cursor>
        </a-camera>

        <a-entity id="target-colosseum" mindar-image-target="targetIndex: 0">
            <a-sphere class="clickable" id="audio-col" position="0 0 0.1" radius="0.15" color="#f1c40f" 
                      animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 1000; loop: true">
                <a-text value="HEAR CROWD" align="center" position="0 0.25 0" scale="0.4 0.4 0.4"></a-text>
            </a-sphere>
        </a-entity>

        <a-entity id="target-petra" mindar-image-target="targetIndex: 1">
            <a-sphere class="clickable" id="audio-petra" position="0 0 0.1" radius="0.15" color="#2ecc71"
                      animation="property: position; to: 0 0.1 0.1; dir: alternate; dur: 1000; loop: true">
                <a-text value="HEAR STREETS" align="center" position="0 0.25 0" scale="0.4 0.4 0.4"></a-text>
            </a-sphere>
        </a-entity>
    </a-scene>

    <script>
        let isDetected = false;
        let artifactName = "";
        const historyData = {
            "Colosseum": {
                facts: ["Built in 70 AD", "Held 50,000 spectators", "Used for gladiator contests"],
                sound: "🔊 [AUDIO] The roar of 50,000 Romans and clashing swords fills the air!"
            },
            "Petra": {
                facts: ["Carved into rose-red cliffs", "Built by the Nabataeans", "Was a major silk trade hub"],
                sound: "🔊 [AUDIO] You hear camel bells and desert winds whistling through the Siq canyon!"
            }
        };

        // TARGET TRACKING
        document.getElementById('target-colosseum').addEventListener("targetFound", () => { isDetected = true; artifactName = "Colosseum"; });
        document.getElementById('target-colosseum').addEventListener("targetLost", () => { isDetected = false; });
        document.getElementById('target-petra').addEventListener("targetFound", () => { isDetected = true; artifactName = "Petra"; });
        document.getElementById('target-petra').addEventListener("targetLost", () => { isDetected = false; });

        // STEP 1: THE SHUTTER
        function takePicture() {
            const overlay = document.getElementById('loading-overlay');
            const loadText = document.getElementById('load-text');
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                loadText.innerText = "🔍 SCANNING IMAGE...";
                setTimeout(() => {
                    overlay.style.display = 'none';
                    if(isDetected) {
                        openCommandCenter();
                    } else {
                        alert("AI ERROR: No artifact found in photo. Please center the image!");
                    }
                }, 1500);
            }, 1000);
        }

        function openCommandCenter() {
            document.getElementById('command-center').style.display = 'block';
            document.getElementById('shutter-btn').style.display = 'none';
            document.getElementById('chat-history').innerHTML = `<p><b>AI:</b> Recognized: ${artifactName}. I only answer history questions about this artifact!</p>`;
            document.getElementById('fact-list').innerHTML = historyData[artifactName].facts.map(f => `<li>${f}</li>`).join('');
        }

        // 3D AUDIO BUTTON LOGIC
        document.getElementById('audio-col').addEventListener('click', () => {
            addMessage("SYSTEM", historyData["Colosseum"].sound);
        });
        document.getElementById('audio-petra').addEventListener('click', () => {
