<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        /* FORCE UI TO THE FRONT */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 99999; pointer-events: none; /* Let clicks pass through to buttons */
        }
        #scan-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 100px; background: #3498db; color: white;
            border: 5px solid white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: bold;
            font-family: Arial, sans-serif; pointer-events: auto; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #museum-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; background: white; border-radius: 15px; display: none;
            font-family: sans-serif; pointer-events: auto; border: 3px solid #f1c40f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden;
        }
        .chat-area { height: 150px; overflow-y: auto; padding: 10px; font-size: 14px; background: #f9f9f9; }
        .input-box { display: flex; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: none; outline: none; }
        .send-btn { background: #3498db; color: white; border: none; padding: 10px; }
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; display: none;
            align-items: center; justify-content: center; flex-direction: column; z-index: 100000;
        }
    </style>
</head>
<body>

    <div id="loading-overlay"><h2>AI IS ANALYZING...</h2></div>

    <div id="ui-layer">
        <div id="scan-btn" onclick="takeSnapshot()">SCAN</div>

        <div id="museum-card">
            <div style="background:#f1c40f; padding:10px; font-weight:bold; display:flex; justify-content:space-between;">
                <span>AI HISTORY EXPLORER</span>
                <button onclick="closeCard()" style="background:red; color:white; border:none;">X</button>
            </div>
            <div id="chat-history" class="chat-area"></div>
            <div class="input-box">
                <input type="text" id="user-input" placeholder="Ask a history question...">
                <button class="send-btn" onclick="runChatbot()">ASK</button>
            </div>
        </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./artifacts.mind; autoStart: true; uiLoading: no;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity id="colosseum" mindar-image-target="targetIndex: 0"></a-entity>
        <a-entity id="petra" mindar-image-target="targetIndex: 1"></a-entity>
    </a-scene>

    <script>
        let currentItem = "";
        let found = false;

        // Detect if the camera sees the image
        document.getElementById('colosseum').addEventListener("targetFound", () => { found = true; currentItem = "Colosseum"; });
        document.getElementById('colosseum').addEventListener("targetLost", () => { found = false; });
        document.getElementById('petra').addEventListener("targetFound", () => { found = true; currentItem = "Petra"; });
        document.getElementById('petra').addEventListener("targetLost", () => { found = false; });

        function takeSnapshot() {
            document.getElementById('loading-overlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
                if(found) {
                    document.getElementById('museum-card').style.display = 'block';
                    document.getElementById('scan-btn').style.display = 'none';
                    document.getElementById('chat-history').innerHTML = `<p><b>AI:</b> I recognized the ${currentItem}! I am over 2,000 years old. What history would you like to know?</p>`;
                } else {
                    alert("AI could not see the image clearly. Try again!");
                }
            }, 2000);
        }

        function closeCard() {
            document.getElementById('museum-card').style.display = 'none';
            document.getElementById('scan-btn').style.display = 'flex';
        }

        // THE CHATBOT BRAIN
        function runChatbot() {
            const input = document.getElementById('user-input');
            const history = document.getElementById('chat-history');
            const question = input.value.toLowerCase();
            
            if(!question) return;

            let answer = "I only answer questions about history! Ask me how I was built or how old I am.";

            // Simple logic for 3rd-6th graders
            if(question.includes("old")) {
                answer = currentItem === "Colosseum" ? "I am about 1,950 years old!" : "I was built around 2,400 years ago!";
            } else if (question.includes("who") || question.includes("built")) {
                answer = currentItem === "Colosseum" ? "The Romans built me using concrete and stone!" : "The Nabateans carved me directly into the pink cliffs!";
            } else if (question.includes("gladiator")) {
                answer = "In the Colosseum, gladiators fought brave battles while the crowd cheered!";
            }

            history.innerHTML += `<p><b>You:</b> ${input.value}</p><p><b>AI:</b> ${answer}</p>`;
            input.value = "";
            history.scrollTop = history.scrollHeight;
        }
    </script>
</body>
</html>
