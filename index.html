<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        /* THIS IS THE BUTTON STYLING */
        #scan-btn {
            position: fixed; 
            bottom: 40px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 90px; 
            height: 90px; 
            background: #3498db; /* SOLID BLUE so you can see it */
            color: white;
            border: 4px solid white;
            border-radius: 50%; 
            z-index: 99999; /* HIGHEST POSSIBLE */
            cursor: pointer; 
            display: flex;
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-family: sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            pointer-events: auto !important;
        }

        #museum-card {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; background: white; border-radius: 20px; display: none;
            font-family: sans-serif; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 100000; overflow: hidden; border: 4px solid #f1c40f;
        }

        .tabs { display: flex; background: #f1c40f; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #f1c40f; font-weight: bold; }
        .tab-btn.active { background: white; }
        .content { padding: 15px; height: 220px; overflow-y: auto; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white; display: none;
            align-items: center; justify-content: center; z-index: 110000;
            flex-direction: column; font-family: sans-serif;
        }

        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="scan-btn" onclick="manualScan()">SCAN</div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div>AI ANALYZING...</div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./artifacts.mind; autoStart: true; uiLoading: no;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-colosseum" mindar-image-target="targetIndex: 0">
            <a-sphere position="0 0 0" radius="0.1" color="yellow" class="clickable"></a-sphere>
        </a-entity>

        <a-entity id="target-petra" mindar-image-target="targetIndex: 1">
            <a-sphere position="0 0 0" radius="0.1" color="green" class="clickable"></a-sphere>
        </a-entity>
    </a-scene>

    <div id="museum-card">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('chat')">AI Chat</button>
            <button class="tab-btn" onclick="showTab('facts')">Facts</button>
            <button onclick="closeUI()" style="background:red; color:white; padding:5px 10px;">X</button>
        </div>
        <div id="chat-tab" class="content">
            <div id="chat-history"></div>
        </div>
        <div id="facts-tab" class="content" style="display:none;">
            <div id="fact-list"></div>
        </div>
    </div>

    <script>
        let isSeeing = false;
        let activeName = "";

        document.getElementById('target-colosseum').addEventListener("targetFound", () => { isSeeing = true; activeName = "Colosseum"; });
        document.getElementById('target-colosseum').addEventListener("targetLost", () => { isSeeing = false; });
        document.getElementById('target-petra').addEventListener("targetFound", () => { isSeeing = true; activeName = "Petra"; });
        document.getElementById('target-petra').addEventListener("targetLost", () => { isSeeing = false; });

        function manualScan() {
            document.getElementById('loading-overlay').style.display = "flex";
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = "none";
                if (isSeeing) {
                    document.getElementById('museum-card').style.display = "block";
                    document.getElementById('scan-btn').style.display = "none";
                    document.getElementById('chat-history').innerHTML = `<b>${activeName}:</b> Ready to explore history!`;
                    document.getElementById('fact-list').innerHTML = activeName === "Colosseum" ? "• It held 50,000 people." : "• It was a secret city.";
                } else {
                    alert("Try again! Make sure the artifact is in the center of the screen.");
                }
            }, 1500);
        }

        function closeUI() {
            document.getElementById('museum-card').style.display = "none";
            document.getElementById('scan-btn').style.display = "flex";
        }

        function showTab(tab) {
            document.getElementById('chat-tab').style.display = tab === 'chat' ? 'block' : 'none';
            document.getElementById('facts-tab').style.display = tab === 'facts' ? 'block' : 'none';
        }
    </script>
</body>
</html>
