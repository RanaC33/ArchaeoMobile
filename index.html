<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #chat-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; background: white; padding: 10px; border-radius: 10px; display: none; }
      #chat-input { width: 70%; }
    </style>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#colosseumModel" scale="0.1 0.1 0.1" position="0 0 0"></a-gltf-model>
        <a-text value="I am the Colosseum! Tap to chat." position="0 -0.5 0" align="center" color="black" class="clickable"></a-text>
      </a-entity>
    </a-scene>

    <div id="chat-container">
      <div id="chat-history">Hello! I'm the Colosseum. Ask me anything!</div>
      <input type="text" id="chat-input" placeholder="Type a question...">
      <button onclick="askAI()">Send</button>
    </div>

    <script>
      // Show chat when the artifact is found
      const target = document.querySelector('[mindar-image-target]');
      target.addEventListener("targetFound", () => {
        document.getElementById('chat-container').style.display = 'block';
      });
    </script>
  </body>
</html>
