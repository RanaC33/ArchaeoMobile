<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

      #ui-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1000; pointer-events: none;
        display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
      }

      #shutter-btn {
        width: 100px; height: 100px; background: #007bff; color: white; border: 5px solid white;
        border-radius: 50%; margin-bottom: 40px; cursor: pointer; pointer-events: auto;
        display: flex; align-items: center; justify-content: center; font-weight: bold;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }

      #timer-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85); color: white; display: none;
        align-items: center; justify-content: center; z-index: 2000;
        flex-direction: column; font-size: 24px;
      }

      #ai-card {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        width: 85%; max-width: 450px; background: white;
        padding: 15px; border-radius: 15px; display: none;
        box-shadow: 0 8px 30px rgba(0,0,0,0.5); z-index: 1001; pointer-events: auto;
      }
      
      .tabs { display: flex; gap: 10px; margin-bottom: 10px; border-bottom: 2px solid #ddd; }
      .tab-link { background: none; border: none; color: #555; font-weight: bold; cursor: pointer; padding: 10px; }
      .tab-link.active { color: #007bff; border-bottom: 3px solid #007bff; }

      #chat-history { height: 150px; overflow-y: auto; margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #eee; padding: 5px; }
      #user-input { width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
      .ai-name { font-weight: bold; color: #e67e22; }
      .user-label { font-weight: bold; color: #2980b9; }
      #close-btn { position: absolute; top: 10px; right: 10px; background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; font-weight: bold;}
    </style>
  </head>
  <body>

    <div id="timer-overlay">
      <div id="status-text">HOLD STEADY... SCANNING ARTIFACT</div>
      <div id="countdown-num" style="font-size: 80px; color: #f1c40f;"></div>
    </div>

    <div id="ui-layer">
      <div id="shutter-btn" onclick="startTimer()">SCAN</div>
    </div>

    <div id="ai-card">
      <button id="close-btn" onclick="resetApp()">X</button>
      
      <div class="tabs">
        <button class="tab-link active" id="chat-tab-btn" onclick="showTab('chat')">HISTORY AI</button>
        <button class="tab-link" id="fact-tab-btn" onclick="showTab('facts')">QUICK FACTS</button>
      </div>

      <div id="chat-section">
        <div id="chat-history">
          <span class="ai-name">History AI:</span> "Target locked. Ask me where, when, or how this was built!"
        </div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="user-input" placeholder="Ask where or when...">
            <button onclick="sendMessage()" style="flex:1; background:#007bff; color:white; border:none; border-radius:8px; cursor:pointer;">ASK</button>
        </div>
      </div>

      <div id="facts-section" style="display:none; font-size: 14px; line-height: 1.6; color: #333;">
        <div id="dynamic-facts"></div>
      </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./artifacts.mind; uiLoading: no;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="colosseum-target" mindar-image-target="targetIndex: 0">
        <a-sphere radius="0.1" color="yellow" position="0 0 0.1" opacity="0.6" animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; dur: 1000; loop: true"></a-sphere>
      </a-entity>

      <a-entity id="petra-target" mindar-image-target="targetIndex: 1">
        <a-sphere radius="0.1" color="green" position="0 0 0.1" opacity="0.6"></a-sphere>
      </a-entity>
    </a-scene>

    <script>
      const aiCard = document.getElementById('ai-card');
      const historyBox = document.getElementById('chat-history');
      const overlay = document.getElementById('timer-overlay');
      const countdownNum = document.getElementById('countdown-num');
      const sceneEl = document.querySelector('a-scene');

      let currentSite = "colosseum"; // Default site
      let isDetected = false;

      // TRACKER & SITE DETECTION
      document.getElementById('colosseum-target').addEventListener("targetFound", () => { 
        isDetected = true; 
        currentSite = "colosseum"; 
      });
      document.getElementById('colosseum-target').addEventListener("targetLost", () => { isDetected = false; });
      
      document.getElementById('petra-target').addEventListener("targetFound", () => { 
        isDetected = true; 
        currentSite = "petra"; 
      });
      document.getElementById('petra-target').addEventListener("targetLost", () => { isDetected = false; });

      function startTimer() {
        overlay.style.display = "flex";
        let timeLeft = 3;
        countdownNum.innerText = timeLeft;
        const timerInterval = setInterval(() => {
          timeLeft -= 1;
          countdownNum.innerText = timeLeft;
          if (timeLeft <= 0) {
            clearInterval(timerInterval);
            captureAndFreeze();
          }
        }, 1000);
      }

      function captureAndFreeze() {
        sceneEl.pause();
        overlay.style.display = "none";
        if (isDetected) {
          aiCard.style.display = "block";
          document.getElementById('shutter-btn').style.display = "none";
          updateFacts(); // Update facts based on what was scanned
        } else {
          alert("I can't see the artifact! Hold the paper flat and try again.");
          resetApp();
        }
      }

      function resetApp() {
        sceneEl.play();
        aiCard.style.display = "none";
        document.getElementById('shutter-btn').style.display = "flex";
      }

      function showTab(tab) {
        document.getElementById('chat-section').style.display = tab === 'chat' ? "block" : "none";
        document.getElementById('facts-section').style.display = tab === 'facts' ? "block" : "none";
        document.getElementById('chat-tab-btn').className = tab === 'chat' ? "tab-link active" : "tab-link";
        document.getElementById('fact-tab-
