<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      /* This is the design for the Chatbox */
      #ai-card {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        width: 85%; background: rgba(255, 255, 255, 0.95);
        padding: 15px; border-radius: 15px; display: none; /* Hidden by default */
        font-family: Arial, sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000;
      }
      #chat-history { height: 100px; overflow-y: auto; margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #ccc; }
      #user-input { width: 70%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
      button { padding: 8px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
      .ai-name { font-weight: bold; color: #e67e22; }
    </style>
  </head>
  <body>

    <a-scene mindar-image="imageTargetSrc: ./colosseum.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="colosseum-target" mindar-image-target="targetIndex: 0">
        <a-box position="0 0 0" scale="0.5 0.5 0.5" material="color: red; opacity: 0.5"></a-box>
      </a-entity>
    </a-scene>

    <div id="ai-card">
      <div id="chat-history">
        <span class="ai-name">Colosseum:</span> "Ave! I am the Flavian Amphitheatre. I was built in 70 AD. Ask me anything!"
      </div>
      <input type="text" id="user-input" placeholder="Ask a question...">
      <button onclick="sendMessage()">Ask</button>
    </div>

    <script>
      const aiCard = document.getElementById('ai-card');
      const target = document.getElementById('colosseum-target');
      const history = document.getElementById('chat-history');

      // SHOW the AI when the image is found
      target.addEventListener("targetFound", event => {
        aiCard.style.display = "block";
      });

      // HIDE the AI if the camera loses the image
      target.addEventListener("targetLost", event => {
        aiCard.style.display = "none";
      });

      // Simple AI logic for kids
      function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.toLowerCase();
        if(!text) return;

        let response = "That is a great question! I am almost 2,000 years old, so I might have forgotten the answer, but I was the biggest arena in Rome!";

        if(text.includes("how many")) response = "I could hold over 50,000 people! That is like a modern football stadium!";
        if(text.includes("gladiator")) response = "Yes! Brave gladiators fought here to show their strength. It was very loud!";
        if(text.includes("who built")) response = "The Emperor Vespasian started my construction as a gift to the Roman people.";

        history.innerHTML += `<br><br><b>You:</b> ${input.value}<br><span class="ai-name">Colosseum:</span> "${response}"`;
        input.value = "";
        history.scrollTop = history.scrollHeight;
      }
    </script>
  </body>
</html>
