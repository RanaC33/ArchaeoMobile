<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
      #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
      #shutter-btn { width: 100px; height: 100px; background: #007bff; color: white; border: 5px solid white; border-radius: 50%; margin-bottom: 40px; cursor: pointer; pointer-events: auto; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
      #timer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: none; align-items: center; justify-content: center; z-index: 2000; flex-direction: column; font-size: 24px; }
      #ai-card { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: white; padding: 15px; border-radius: 15px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1001; pointer-events: auto; border: 3px solid #f1c40f; }
      .tabs { display: flex; gap: 10px; margin-bottom: 10px; border-bottom: 2px solid #ddd; }
      .tab-link { background: none; border: none; color: #555; font-weight: bold; cursor: pointer; padding: 10px; }
      .tab-link.active { color: #007bff; border-bottom: 3px solid #007bff; }
      #chat-history { height: 140px; overflow-y: auto; margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #eee; padding: 5px; background: #f9f9f9; border-radius: 5px; }
      #user-input { width: 65%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
      .ai-name { font-weight: bold; color: #e67e22; }
      #close-btn { position: absolute; top: 10px; right: 10px; background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }
    </style>
  </head>
  <body>

    <div id="timer-overlay">
      <div id="status-text">LOCATING ARTIFACT...</div>
      <div id="countdown-num" style="font-size: 80px; color: #f1c40f;"></div>
    </div>

    <div id="ui-layer">
      <div id="shutter-btn" onclick="startTimer()">SCAN</div>
    </div>

    <div id="ai-card">
      <button id="close-btn" onclick="resetApp()">X</button>
      <div class="tabs">
        <button class="tab-link active" id="chat-tab-btn" onclick="showTab('chat')">AI CHAT</button>
        <button class="tab-link" id="fact-tab-btn" onclick="showTab('facts')">FUN FACTS</button>
      </div>

      <div id="chat-section">
        <div id="chat-history"><span class="ai-name">History AI:</span> "I am ready! Ask me where, when, or what happened here!"</div>
        <div style="display:flex; gap:5px;">
          <input type="text" id="user-input" placeholder="Ask a question...">
          <button onclick="sendMessage()" style="background:#007bff; color:white; border:none; border-radius:8px; padding:10px; cursor:pointer;">ASK</button>
        </div>
      </div>

      <div id="facts-section" style="display:none; font-size: 14px; line-height: 1.6;">
        <div id="dynamic-facts"></div>
      </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./artifacts.mind; uiLoading: no;" vr-mode-ui="enabled: false">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target0" mindar-image-target="targetIndex: 0">
        <a-sphere radius="0.1" color="yellow" opacity="0.5"></a-sphere>
      </a-entity>
      
      <a-entity id="target1" mindar-image-target="targetIndex: 1">
        <a-sphere radius="0.1" color="green" opacity="0.5"></a-sphere>
      </a-entity>
    </a-scene>

    <script>
      const aiCard = document.getElementById('ai-card');
      const historyBox = document.getElementById('chat-history');
      const overlay = document.getElementById('timer-overlay');
      const countdownNum = document.getElementById('countdown-num');
      const dynamicFacts = document.getElementById('dynamic-facts');
      const sceneEl = document.querySelector('a-scene');

      let lastSeen = "colosseum"; // Default to Colosseum so it always works

      document.getElementById('target0').addEventListener("targetFound", () => { lastSeen = "colosseum"; });
      document.getElementById('target1').addEventListener("targetFound", () => { lastSeen = "petra"; });

      function startTimer() {
        overlay.style.display = "flex";
        let timeLeft = 3;
        countdownNum.innerText = timeLeft;
        const interval = setInterval(() => {
          timeLeft--;
          countdownNum.innerText = timeLeft;
          if (timeLeft <= 0) {
            clearInterval(interval);
            capture();
          }
        }, 1000);
      }

      function capture() {
        sceneEl.pause();
        overlay.style.display = "none";
        aiCard.style.display = "block";
        document.getElementById('shutter-btn').style.display = "none";
        updateFacts();
      }

      function updateFacts() {
        if(lastSeen === "colosseum") {
          dynamicFacts.innerHTML = `
            <b>🏛️ Colosseum Quick Facts:</b>
            <ul>
              <li><b>Where:</b> Located in Rome, Italy.</li>
              <li><b>When:</b> Built between 70 AD and 80 AD.</li>
              <li><b>Used For:</b> Gladiatorial contests, animal hunts, and even mock sea battles!</li>
              <li><b>Size:</b> It could hold over 50,000 spectators.</li>
            </ul>`;
        } else {
          dynamicFacts.innerHTML = `
            <b>🏜️ Petra Quick Facts:</b>
            <ul>
              <li><b>Where:</b> Located in Ma'an, Jordan.</li>
              <li><b>When:</b> Built around 400 BC.</li>
              <li><b>Used For:</b> A capital city for the Nabataean kingdom and a major trade hub.</li>
              <li><b>Feature:</b> Famous for its rock-cut architecture.</li>
            </ul>`;
        }
      }

      function resetApp() {
        sceneEl.play();
        aiCard.style.display = "none";
        document.getElementById('shutter-btn').style.display = "flex";
      }

      function showTab(tab) {
        document.getElementById('chat-section').style.display = tab === 'chat' ? "block" : "none";
        document.getElementById('facts-section').style.display = tab === 'facts' ? "block" : "none";
        document.getElementById('chat-tab-btn').className = tab === 'chat' ? "tab-link active" : "tab-link";
        document.getElementById('fact-tab-btn').className = tab === 'facts' ? "tab-link active" : "tab-link";
      }

      function sendMessage() {
        const input = document.getElementById('user-input');
        const q = input.value.toLowerCase();
        if(!q) return;

        let a = "I'm a history expert! Ask me specifically 'where', 'when', or 'what was it used for?'";

        // COLOSSEUM ANSWERS
        if(lastSeen === "colosseum") {
          if(q.includes("where")) a = "The Colosseum was built in the heart of Rome, Italy!";
          else if(q.includes("when") || q.includes("built")) a = "Construction started in 70 AD under Emperor Vespasian and finished in 80 AD.";
          else if(q.includes("gladiator") || q.includes("play") || q.includes("used for")) a = "It was used for gladiator battles, public spectacles, and theatre! They even flooded it for ship battles.";
          else if(q.includes("how many") || q.includes("big")) a = "It's huge! It held up to 80,000 people.";
        } 
        // PETRA ANSWERS
        else {
          if(q.includes("where")) a = "Petra is hidden in the desert canyons of Jordan.";
          else if(q.includes("when") || q.includes("built")) a = "It was built over 2,300 years ago, around 400 BC.";
          else if(q.includes("used for")) a = "It was a massive trading city where people from all over the world met.";
        }

        historyBox.innerHTML += `<div style="margin-top:10px;"><b>You:</b> ${input.value}</div>`;
        historyBox.innerHTML += `<div><span class="ai-name">AI:</span> "${a}"</div>`;
        input.value = "";
        historyBox.scrollTop = historyBox.scrollHeight;
      }
    </script>
  </body>
</html>
