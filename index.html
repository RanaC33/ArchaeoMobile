<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* TOP STATUS BAR */
        #debug-log {
            position: fixed; top: 10px; left: 10px; padding: 10px;
            background: rgba(0,0,0,0.7); color: #00ff00; font-family: monospace;
            z-index: 10001; font-size: 12px; border-radius: 5px; pointer-events: none;
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
        }

        #shutter-btn {
            width: 100px; height: 100px; background: #3498db; color: white; border: 6px solid white;
            border-radius: 50%; margin-bottom: 40px; cursor: pointer; pointer-events: auto;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 18px; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        #command-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 450px; max-width: 90%; background: white; border-radius: 20px;
            display: none; pointer-events: auto; border: 5px solid #f1c40f;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6); overflow: hidden;
        }

        .tabs { display: flex; background: #f1c40f; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: #f1c40f; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: white; }
        .content-area { height: 250px; overflow-y: auto; padding: 20px; background: #fdfdfd; }
        .chat-input { display: flex; padding: 12px; background: #eee; gap: 8px; }
        .chat-input input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        .chat-input button { background: #3498db; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white; display: none;
            align-items: center; justify-content: center; z-index: 10000; flex-direction: column;
        }
    </style>
</head>
<body>

    <div id="debug-log">System: Initializing AR...</div>

    <div id="loading-overlay">
        <h2 id="status-msg">GET READY...</h2>
        <div id="timer-display" style="font-size: 50px; color: #f1c40f;"></div>
    </div>

    <div id="ui-layer">
        <div id="shutter-btn" onclick="startTimer()">SCAN</div>

        <div id="command-center">
            <div class="tabs">
                <button class="tab-btn active" id="tab-chat" onclick="showTab('chat')">AI CHAT</button>
                <button class="tab-btn" id="tab-facts" onclick="showTab('facts')">FACTS</button>
                <button onclick="closeUI()" style="background:red; color:white; border:none; padding:10px; cursor:pointer;">X</button>
            </div>
            <div id="chat-tab" class="content-area">
                <div id="chat-history"></div>
            </div>
            <div id="facts-tab" class="content-area" style="display:none;">
                <ul id="fact-list"></ul>
            </div>
            <div class="chat-input">
                <input type="text" id="user-input" placeholder="Ask about history...">
                <button onclick="askAI()">ASK</button>
            </div>
        </div>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./artifacts.mind; autoStart: true; uiLoading: no; uiScanning: yes; filterMinCF:0.00001; filterBeta: 0.0001;" vr-mode-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false">
            <a-cursor fuse="false" raycaster="objects: .clickable"></a-cursor>
        </a-camera>

        <a-entity id="col-target" mindar-image-target="targetIndex: 0">
            <a-sphere class="clickable" radius="0.1" color="yellow"></a-sphere>
        </a-entity>

        <a-entity id="petra-target" mindar-image-target="targetIndex: 1">
            <a-sphere class="clickable" radius="0.1" color="green"></a-sphere>
        </a-entity>
    </a-scene>

    <script>
        let found = false;
        let active = "";
        const log = document.getElementById('debug-log');

        // Check if MindAR is actually loading the file
        window.addEventListener("load", () => {
            log.innerText = "System: Camera Active. Searching for artifacts.mind...";
        });

        document.getElementById('col-target').addEventListener("targetFound", () => { 
            found = true; active = "Colosseum"; 
            log.innerText = "System: Target Found! (Colosseum)";
        });
        document.getElementById('col-target').addEventListener("targetLost", () => { found = false; log.innerText = "System: Target Lost."; });
        
        document.getElementById('petra-target').addEventListener("targetFound", () => { 
            found = true; active = "Petra"; 
            log.innerText = "System: Target Found! (Petra)";
        });
        document.getElementById('petra-target').addEventListener("targetLost", () => { found = false; log.innerText = "System: Target Lost."; });

        function startTimer() {
            const overlay = document.getElementById('loading-overlay');
            const timer = document.getElementById('timer-display');
            const scene = document.querySelector('a-scene');
            overlay.style.display = 'flex';
            
            let time = 3;
            timer.innerText = time;

            const interval = setInterval(() => {
                time--;
                timer.innerText = time;
                if(time <= 0) {
                    clearInterval(interval);
                    scene.pause();
                    document.getElementById('status-msg').innerText = "PHOTO CAPTURED!";
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        if(found) {
                            document.getElementById('command-center').style.display = 'block';
                            document.getElementById('shutter-btn').style.display = 'none';
                            document.getElementById('chat-history').innerHTML = `<p><b>AI:</b> I see the ${active}. Ask me a history question!</p>`;
                            document.getElementById('fact-list').innerHTML = active === "Colosseum" ? "<li>Built in 70 AD</li>" : "<li>Built in 400 BC</li>";
                        } else {
                            alert("AI ERROR: Image was too blurry or not found. Unfreezing...");
                            closeUI();
                        }
                    }, 1000);
                }
            }, 1000);
        }

        function closeUI() {
            document.querySelector('a-scene').play();
            document.getElementById('command-center').style.display = 'none';
            document.getElementById('shutter-btn').style.display = 'flex';
            document.getElementById('status-msg').innerText = "GET READY...";
        }

        function showTab(t) {
            document.getElementById('chat-tab').style.display = t === 'chat' ? 'block' : 'none';
            document.getElementById('facts-tab').style.display = t === 'facts' ? 'block' : 'none';
        }

        function askAI() {
            const input = document.getElementById('user-input');
            const history = document.getElementById('chat-history');
            let reply = "I only answer history questions!";
            if(input.value.toLowerCase().includes("old")) reply = "Over 2,000 years old!";
            history.innerHTML += `<p><b>You:</b> ${input.value}</p><p><b>AI:</b> ${reply}</p>`;
            input.value = "";
        }
    </script>
</body>
</html>
